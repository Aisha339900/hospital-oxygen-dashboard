<svg width="100%" viewBox="0 0 64 64" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>O2 app icon</title>
  <desc>Rounded purple icon with O2 text.</desc>
  <defs>
    <linearGradient id="iconGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7B5EA7"/>
      <stop offset="100%" stop-color="#C2549A"/>
    </linearGradient>
  </defs>

  <rect x="3" y="3" width="58" height="58" rx="14" fill="url(#iconGrad)" />

  <text x="29" y="36" font-size="24" font-weight="700" fill="#ffffff" text-anchor="middle" dominant-baseline="middle" font-family="Arial, Helvetica, sans-serif">O</text>
  <text x="40" y="39" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle" dominant-baseline="middle" font-family="Arial, Helvetica, sans-serif">2</text>
</svg>
